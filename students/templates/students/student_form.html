{% extends 'base.html' %}

{% block title %}{% if student %}Edit Student{% else %}Add New Student{% endif %} - Student Records{% endblock %}

{% block content %}
<h2>{% if student %}Edit Student{% else %}Add New Student{% endif %}</h2>

<form method="POST" class="form">
    {% csrf_token %}
    
    <div class="form-row">
        <div class="form-group">
            <label for="first_name">First Name:</label>
            <input type="text" id="first_name" name="first_name" value="{{ student.first_name|default:'' }}" required>
        </div>
        
        <div class="form-group">
            <label for="last_name">Last Name:</label>
            <input type="text" id="last_name" name="last_name" value="{{ student.last_name|default:'' }}" required>
        </div>
    </div>
    
    <div class="form-row">
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" value="{{ student.email|default:'' }}" required>
        </div>
        
        <div class="form-group">
            <label for="phone">Phone:</label>
            <input type="tel" id="phone" name="phone" value="{{ student.phone|default:'' }}">
        </div>
    </div>
    
    <div class="form-row">
        <div class="form-group">
            <label for="gpa">GPA:</label>
            <input type="number" id="gpa" name="gpa" step="0.01" min="0" max="4" value="{{ student.gpa|default:'' }}">
        </div>
    </div>
    
    <div class="action-buttons">
        <button type="submit" class="btn btn-primary">Submit</button>
        <a href="{% url 'student_list' %}" class="btn btn-secondary">Cancel</a>
    </div>
</form>

{% endblock %}
