{% extends 'base.html' %}

{% block title %}Delete Student - Student Records{% endblock %}

{% block content %}
<h2>Delete Student</h2>

<div class="detail-box" style="background-color: #fed7d7; border: 1px solid #fc8181;">
    <p style="color: #742a2a; margin-bottom: 15px;">
        <strong>⚠️ Warning:</strong> Are you sure you want to delete <strong>{{ student.first_name }} {{ student.last_name }}</strong>? 
        This action cannot be undone.
    </p>
</div>

<form method="POST">
    {% csrf_token %}
    
    <div class="action-buttons">
        <button type="submit" class="btn btn-danger">Delete {{ student.first_name }} {{ student.last_name }}</button>
        <a href="{% url 'student_list' %}" class="btn btn-secondary">Cancel</a>
    </div>
</form>

{% endblock %}
